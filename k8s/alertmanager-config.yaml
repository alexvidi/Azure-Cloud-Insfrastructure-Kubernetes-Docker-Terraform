# -----------------------------------------------------------------------------
# Alertmanager configuration
#
# Goal:
# - Route Prometheus alerts to an email receiver.
# - Keep SMTP credentials outside the repository by reading the password from a
#   Kubernetes Secret mounted as a file.
# -----------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: smtp.gmail.com:587
      smtp_from: alexvidaldepalol@gmail.com
      smtp_auth_username: alexvidaldepalol@gmail.com
      smtp_auth_identity: alexvidaldepalol@gmail.com
      smtp_auth_password_file: /etc/alertmanager/secrets/smtp-password
      smtp_require_tls: true

    route:
      receiver: email-alerts
      group_by:
        - alertname
        - service
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h

    receivers:
      - name: email-alerts
        email_configs:
          - to: alexvidaldepalol@gmail.com
            send_resolved: true
