# -----------------------------------------------------------------------------
# GitHub Actions Workflow: Build, Scan, and Deploy to AKS
#
# Goal:
# - Build the FastAPI Docker image and push to ACR using OIDC (no passwords).
# - Scan the container image with Trivy (fail on HIGH/CRITICAL).
# - Deploy to AKS using raw Kubernetes manifests (kubectl apply) and set the
#   image tag to the current commit SHA.
#
# Triggers:
# - Manual trigger (workflow_dispatch).
# - Pushes to master (continuous delivery).
# -----------------------------------------------------------------------------

name: Deploy

on:
  workflow_dispatch:

  push:
    branches: ["master"]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/**"

env:
  IMAGE_NAME: market-quote-api
  K8S_NAMESPACE: market-quote

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: BUILD, SCAN, AND PUSH IMAGE
  # -----------------------------------------------------------------------------
  build_and_push:
    name: Build, Scan, and Push
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # Build once (load locally) for Trivy scan, using cache.
      - name: Build Image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.69.3
          cache: true

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: "1"
          format: sarif
          output: trivy.sarif
          ignore-unfixed: true
          skip-setup-trivy: true

      - name: Upload Trivy Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # Push after a clean scan.
      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------------
  # JOB 2: DEPLOY TO AKS WITH RAW MANIFESTS
  # -----------------------------------------------------------------------------
  deploy:
    name: Deploy to AKS (manifests)
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --admin \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_NAME }} \
            --overwrite-existing

      - name: Apply namespaces first
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/monitoring-namespace.yaml

      - name: Create Grafana admin secret
        env:
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          if [ -z "$GRAFANA_ADMIN_USER" ] || [ -z "$GRAFANA_ADMIN_PASSWORD" ]; then
            echo "Missing GRAFANA_ADMIN_USER or GRAFANA_ADMIN_PASSWORD GitHub secret."
            exit 1
          fi

          kubectl create secret generic grafana-admin \
            --namespace monitoring \
            --from-literal=admin-user="$GRAFANA_ADMIN_USER" \
            --from-literal=admin-password="$GRAFANA_ADMIN_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Update deployment image to current commit
        run: |
          kubectl set image -n ${{ env.K8S_NAMESPACE }} deployment/market-quote-api market-quote-container=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status -n ${{ env.K8S_NAMESPACE }} deployment/market-quote-api --timeout=180s

      # -----------------------------------------------------------------------------
      # POST-DEPLOY SMOKE TEST
      #
      # Goal:
      # - Verify that the Kubernetes Service has ready endpoints after rollout.
      # - Validate the application from inside the cluster network path.
      # - Confirm both the operational endpoint (/health) and the main API
      #   endpoint (/quote) respond with the expected payload.
      # -----------------------------------------------------------------------------
      - name: Smoke test application
        run: |
          set -euo pipefail

          # Ensure the Service already routes to ready Pods before testing.
          ENDPOINTS=$(kubectl get endpoints market-quote-service -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.subsets[*].addresses[*].ip}')
          if [ -z "$ENDPOINTS" ]; then
            echo "Service has no ready endpoints."
            kubectl get endpoints market-quote-service -n ${{ env.K8S_NAMESPACE }} -o yaml
            exit 1
          fi

          # Forward the in-cluster Service to localhost so the workflow can
          # exercise the app without depending on public ingress or DNS.
          kubectl port-forward -n ${{ env.K8S_NAMESPACE }} svc/market-quote-service 18080:80 >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID" >/dev/null 2>&1 || true' EXIT

          # Retry the health check briefly while the port-forward becomes ready.
          for attempt in {1..10}; do
            if curl -fsS http://127.0.0.1:18080/health > health.json; then
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              echo "Smoke test could not reach /health after rollout."
              cat /tmp/port-forward.log || true
              exit 1
            fi

            sleep 2
          done

          # Validate the main API endpoint after the basic health check passes.
          curl -fsS "http://127.0.0.1:18080/quote?symbol=BTC" > quote.json

          # Assert that both responses keep the expected API contract.
          python3 - <<'PY'
          from datetime import datetime
          import json

          with open("health.json", "r", encoding="utf-8") as f:
              health = json.load(f)
          assert health == {"status": "ok"}, health

          with open("quote.json", "r", encoding="utf-8") as f:
              quote = json.load(f)
          assert quote["symbol"] == "BTC", quote
          assert quote["currency"] == "USD", quote
          assert isinstance(quote["price"], int), quote
          assert quote["price"] > 0, quote
          assert quote["source"] == "synthetic", quote
          assert datetime.fromisoformat(quote["generated_at"]).tzinfo is not None, quote
          PY

      # -----------------------------------------------------------------------------
      # FAILURE DIAGNOSTICS
      #
      # Goal:
      # - Surface the most useful deployment state when the smoke test fails.
      # - Keep debugging lightweight and immediately visible in GitHub Actions.
      # -----------------------------------------------------------------------------
      - name: Debug deployment state on failure
        if: failure()
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}
          kubectl describe deployment -n ${{ env.K8S_NAMESPACE }} market-quote-api
          kubectl logs -n ${{ env.K8S_NAMESPACE }} deployment/market-quote-api --tail=100
